# sonar-project.properties
sonar.projectKey=openbox-deepagents-sdk-python
sonar.projectName=openbox-deepagents-sdk-python
sonar.sources=openbox_deepagent
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python configuration
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/.venv/**,**/venv/**,**/env/**,**/.env/**,**/migrations/**
